# Template for the real cloud credentials. Copy to secrets.cloud.yaml (which is
# git-ignored) and fill in strong values. These are strategic-merge patches:
# they override ONLY the password fields of the base Secrets, leaving usernames,
# DB names and connection URLs (defined in the ConfigMaps) untouched.
#
# Values that MUST be identical are marked with the same <PLACEHOLDER>:
#   <DB_PASSWORD>          postgres password (primary, replica, backend, ml-worker)
#   <REPLICATION_PASSWORD> postgres physical-replication role password
#   <RABBITMQ_PASSWORD>    rabbitmq password (broker, backend, ml-worker)
#   <JWT_SECRET>           backend JWT signing secret (long random)
#
# Generate in Azure Cloud Shell with:
#   DB_PASSWORD=$(openssl rand -hex 24)
#   REPLICATION_PASSWORD=$(openssl rand -hex 24)
#   RABBITMQ_PASSWORD=$(openssl rand -hex 24)
#   JWT_SECRET=$(openssl rand -hex 48)
# then substitute.
---
apiVersion: v1
kind: Secret
metadata:
  name: lipid-postgres-secret
  namespace: lipid-classifier
stringData:
  POSTGRES_PASSWORD: <DB_PASSWORD>
  REPLICATION_PASSWORD: <REPLICATION_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: lipid-backend-secret
  namespace: lipid-classifier
stringData:
  DB_PASSWORD: <DB_PASSWORD>
  JWT_SECRET: <JWT_SECRET>
  RABBITMQ_PASSWORD: <RABBITMQ_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: lipid-ml-worker-secret
  namespace: lipid-classifier
stringData:
  DB_PASSWORD: <DB_PASSWORD>
  POSTGRES_PASSWORD: <DB_PASSWORD>
  RABBITMQ_PASSWORD: <RABBITMQ_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: lipid-rabbitmq-secret
  namespace: lipid-classifier
stringData:
  RABBITMQ_DEFAULT_PASS: <RABBITMQ_PASSWORD>
