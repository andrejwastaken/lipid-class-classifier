name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io

jobs:
  docker:
    name: Build service images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            image: lipid-classifier-frontend
          - service: backend
            context: ./backend
            image: lipid-classifier-backend
          - service: ml-worker
            context: ./ml-service
            image: lipid-classifier-ml-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

  update-manifests:
    name: Pin image tags in manifests
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pin new image tags in kustomization.yaml
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          for svc in backend frontend ml-worker; do
            name="docker.io/${DOCKERHUB_USERNAME}/lipid-classifier-${svc}"
            yq -i \
              "(.images[] | select(.name == \"${name}\") | .newTag) = \"${IMAGE_TAG}\"" \
              k8s/kustomization.yaml
          done
          echo "Updated image tags:"
          yq '.images' k8s/kustomization.yaml

      - name: Commit and push tag bump
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/kustomization.yaml; then
            echo "No tag changes to commit."
            exit 0
          fi
          git add k8s/kustomization.yaml
          git commit -m "ci: pin image tags to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
