spring.datasource.url=jdbc:h2:mem:lipid_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

app.jwt.secret=test-secret-with-enough-length-for-local-tests
app.jwt.expiration-ms=3600000
app.upload-dir=${java.io.tmpdir}/lipid-classifier-test-uploads
app.messaging.ml-jobs-queue=ml_jobs
