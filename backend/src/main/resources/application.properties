spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/app_db}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:100MB}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-before-deploying}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload-dir=${UPLOAD_DIR:uploads}
app.messaging.ml-jobs-queue=${ML_JOBS_QUEUE:ml_jobs}
