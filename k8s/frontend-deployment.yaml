apiVersion: apps/v1
kind: Deployment
metadata:
  name: lipid-frontend
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-frontend
    app.kubernetes.io/part-of: lipid-class-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lipid-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lipid-frontend
        app.kubernetes.io/part-of: lipid-class-classifier
    spec:
      containers:
        - name: frontend
          image: docker.io/aristikj/lipid-classifier-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

