apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - postgres-deployment.yaml
  - rabbitmq-deployment.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - ml-worker-deployment.yaml
  - services.yaml
  - ingress.yaml
  
images:
  - name: docker.io/aristikj/lipid-classifier-backend
    newTag: latest
  - name: docker.io/aristikj/lipid-classifier-frontend
    newTag: latest
  - name: docker.io/aristikj/lipid-classifier-ml-worker
    newTag: latest
