apiVersion: v1
kind: ConfigMap
metadata:
  name: lipid-ml-worker-config
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-ml-worker
    app.kubernetes.io/part-of: lipid-class-classifier
data:
  DB_URL: jdbc:postgresql://lipid-postgres-primary.lipid-classifier.svc.cluster.local:5432/app_db
  DB_USER: user
  POSTGRES_HOST: lipid-postgres-primary.lipid-classifier.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: app_db
  POSTGRES_USER: user
  RABBITMQ_HOST: lipid-rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: guest
  ML_JOBS_QUEUE: ml_jobs
---
apiVersion: v1
kind: Secret
metadata:
  name: lipid-ml-worker-secret
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-ml-worker
    app.kubernetes.io/part-of: lipid-class-classifier
type: Opaque
stringData:
  DB_PASSWORD: password
  POSTGRES_PASSWORD: password
  RABBITMQ_PASSWORD: guest
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lipid-model-artifacts-pvc
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-model-artifacts
    app.kubernetes.io/part-of: lipid-class-classifier
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lipid-ml-worker
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-ml-worker
    app.kubernetes.io/part-of: lipid-class-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lipid-ml-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lipid-ml-worker
        app.kubernetes.io/part-of: lipid-class-classifier
    spec:
      containers:
        - name: ml-worker
          image: docker.io/aristikj/lipid-classifier-ml-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lipid-ml-worker-config
            - secretRef:
                name: lipid-ml-worker-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: model-artifacts
              mountPath: /app/artifacts
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: lipid-uploads-pvc
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: lipid-model-artifacts-pvc
