apiVersion: v1
kind: Secret
metadata:
  name: lipid-rabbitmq-secret
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-rabbitmq
    app.kubernetes.io/part-of: lipid-class-classifier
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lipid-rabbitmq-pvc
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-rabbitmq
    app.kubernetes.io/part-of: lipid-class-classifier
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lipid-rabbitmq
  namespace: lipid-classifier
  labels:
    app.kubernetes.io/name: lipid-rabbitmq
    app.kubernetes.io/part-of: lipid-class-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lipid-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lipid-rabbitmq
        app.kubernetes.io/part-of: lipid-class-classifier
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          envFrom:
            - secretRef:
                name: lipid-rabbitmq-secret
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: lipid-rabbitmq-pvc

